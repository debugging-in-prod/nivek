name: Build and Deploy Core API

on:
  push:
    branches: [main]
    paths:
      - 'cmd/core-api/**' # if any of these paths are updated, then trigger a workflow run
      - 'internal/**'
      - 'pkg/**'
      - 'go.mod'
      - 'go.sum'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest  # Build on GitHub's servers

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build for ARM64
        run: |
          mkdir -p bin
          GOOS=linux GOARCH=arm64 go build -o bin/core-api ./cmd/core-api

  deploy:
    needs: build
    runs-on: [self-hosted, linux, prod]  # Your Vultr runner labels

    steps:
      - name: Deploy
        run: |
          /home/deploy/actions-runner/deploy-core-api.sh
