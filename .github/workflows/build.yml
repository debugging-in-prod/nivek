name: Pull Core API Updates

on:
  push:
    branches:
      - main
    # Optional: limit triggers to certain paths if you want
    # paths:
    #   - 'cmd/core-api/**'
    #   - 'internal/**'
    #   - 'pkg/**'
    #   - 'go.mod'
    #   - 'go.sum'

permissions:
  contents: write

jobs:
  pull:
    runs-on: [self-hosted, linux, prod]  # Vultr runner labels

    steps:
      - name: Checkout repository into live directory
        uses: actions/checkout@v4
        with:
          # Path to project
          path: /home/deploy/apps

      - name: List pulled files (sanity check)
        run: |
          echo "Repository pulled to /home/deploy/apps"
