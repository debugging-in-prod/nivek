name: Build and Deploy Core API

on:
  push:
    branches: [main]
    paths:
      - 'cmd/core-api/**'
      - 'internal/**'
      - 'pkg/**'
      - 'go.mod'
      - 'go.sum'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest  # Build on GitHub's servers

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build for ARM64
        run: |
          mkdir -p bin
          GOOS=linux GOARCH=arm64 go build -o bin/core-api ./cmd/core-api

      - name: Commit and push binary
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add bin/core-api
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update core-api binary [skip ci]" && git push)

  deploy:
    needs: build  # Wait for build to finish
    runs-on: self-hosted  # Runs on your Pi!

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4

      - name: Deploy with Docker Compose
        run: |
          docker compose up -d --force-recreate core-api
