name: Build and Deploy Core API

on:
  push:
    branches: [main]
    paths:
      - 'cmd/core-api/**'
      - 'internal/**'
      - 'pkg/**'
      - 'go.mod'
      - 'go.sum'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest  # Build on GitHub's servers

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build for ARM64
        run: |
          mkdir -p bin
          GOOS=linux GOARCH=arm64 go build -o bin/core-api ./cmd/core-api

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: core-api-arm64
          path: bin/core-api

  deploy:
    needs: build  # Wait for build to finish
    runs-on: self-hosted  # Runs on host machine
    defaults:
      run:
        working-directory: /home/nut/nivek

    steps:
      - name: Pull latest code
        working-directory: /home/nut/nivek
        run: git pull

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: core-api-arm64
          path: /home/nut/nivek/bin/

      - name: Make binary executable
        run: chmod +x /home/nut/nivek/bin/core-api

      - name: Deploy with Docker Compose
        working-directory: /home/nut/nivek
        run: |
          docker compose up -d --force-recreate core-api
