name: Prod Service Deployment

on:
  push:
    branches:
      - main
    # Optional: limit triggers to certain paths if you want
    # paths:
    #   - 'cmd/core-api/**'
    #   - 'internal/**'
    #   - 'pkg/**'
    #   - 'go.mod'
    #   - 'go.sum'

permissions:
  contents: write

jobs:
  pull:
    runs-on: [self-hosted, linux, prod]  # Vultr runner labels

    steps:
      - name: Checkout repository (default workspace)
        uses: actions/checkout@v4

      - name: List pulled files (sanity check)
        run: |
          echo "Repository pulled to runner workspace"
          pwd
          ls -la
  deploy:
    needs: pull
    runs-on: [self-hosted, linux, prod]

    steps:
      # Stamp the short commit SHA into BOTH frontend bundles so the footer
      # build tag reflects what was actually deployed. nivek-vue is still
      # the production SPA; nivek-nuxt builds for staging during the SSR
      # migration. Both files get the same SHA each deploy — once the SPA
      # is retired the nivek-vue stamp goes away with it.
      - name: Stamp build version
        run: |
          SHA=$(git rev-parse --short HEAD)
          cat > nivek-vue/src/version.ts <<EOF
          export const BUILD_VERSION = '${SHA}'
          EOF
          cat > nivek-nuxt/app/utils/version.ts <<EOF
          export const BUILD_VERSION = '${SHA}'
          EOF

      - name: Env Setup
        run: /home/deploy/actions-runner/env-setup.sh
