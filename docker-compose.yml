services:
  postgres:
    image: postgres:16
    pull_policy: always
    environment:
      - POSTGRES_USER=${POSTGRES_USERNAME}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    # No `ports:` mapping: Postgres is reached only over the nivek-internal
    # Docker network by core-api. Publishing 5432 also punches a hole through
    # the host firewall via docker's iptables rules, which exposed the DB to
    # public credential-stuffing scanners. For admin access use
    # `docker compose exec postgres psql`.
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - nivek-internal

  core-api:
    build:
      dockerfile: docker/images/go/Dockerfile.core-api.prod
      pull: true
    environment:
      - APP_NAME=${APP_NAME}
      - CORE_API_PORT=${CORE_API_PORT}
      - CORE_API_LISTEN_ADDRESS=${CORE_API_LISTEN_ADDRESS}
      - POSTGRES_USERNAME=${POSTGRES_USERNAME}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=5432
      - POSTGRES_SSL_MODE=${POSTGRES_SSL_MODE}
      - WINDY_API_TOKEN=${WINDY_API_TOKEN}
      - IP_INFO_API_TOKEN=${IP_INFO_API_TOKEN}
      - TWITCH_API_TOKEN=${TWITCH_API_TOKEN}
      - JWT_SECRET=${JWT_SECRET}
      - TWITCH_CLIENT_ID=${TWITCH_CLIENT_ID}
      - TWITCH_CLIENT_SECRET=${TWITCH_CLIENT_SECRET}
      - TWITCH_REDIRECT_URI=${TWITCH_REDIRECT_URI}
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL}
      - DASHBOARD_PUSH_HMAC_KEY=${DASHBOARD_PUSH_HMAC_KEY}
      - BOT_API_HMAC_KEY=${BOT_API_HMAC_KEY}
    networks:
      - nivek-internal
      - gateway
    restart: unless-stopped
    # Lets `docker rollout` wait until a new container is actually serving
    # before removing the old one (zero-downtime deploys). wget ships in the
    # alpine runtime image, so no extra tooling is needed.
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8080/api/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s
    # Traefik now only routes /api/* to core-api on peanutbudderbot.com — the rest
    # of the site is served by the Nuxt SSR `web` service below. Rule-length
    # priority puts the compound rule (Host && PathPrefix) ahead of `web`'s
    # bare Host rule for /api/* matches; everything else falls through.
    #
    # The SPA dist baked into this container by the prod Dockerfile is now
    # dead weight (never reached by Traefik) — removing the SPA build stage
    # from Dockerfile.core-api.prod is a follow-up cleanup commit.
    labels:
      - traefik.enable=true
      - traefik.http.routers.nivek.rule=Host(`peanutbudderbot.com`) && PathPrefix(`/api`)
      - traefik.http.routers.nivek.entrypoints=websecure
      - traefik.http.routers.nivek.tls.certresolver=letsencrypt
      - traefik.http.services.nivek.loadbalancer.server.port=8080

  # Nuxt 4 SSR frontend — serves peanutbudderbot.com for every path that doesn't
  # match /api/*. Replaces SPA-on-core-api as the production frontend.
  web:
    build:
      dockerfile: docker/images/nuxt/Dockerfile.prod
      pull: true
    networks:
      - gateway
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s
    labels:
      - traefik.enable=true
      - traefik.http.routers.nivek-web.rule=Host(`peanutbudderbot.com`)
      - traefik.http.routers.nivek-web.entrypoints=websecure
      - traefik.http.routers.nivek-web.tls.certresolver=letsencrypt
      - traefik.http.services.nivek-web.loadbalancer.server.port=3000

volumes:
  postgres_data:
    name: postgres_data

networks:
  nivek-internal:
    driver: bridge
  gateway:
    external: true
