services:
  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=${POSTGRES_USERNAME}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - nivek-internal

  core-api:
    build:
      dockerfile: docker/images/go/Dockerfile.core-api.prod
    environment:
      - APP_NAME=${APP_NAME}
      - CORE_API_PORT=${CORE_API_PORT}
      - CORE_API_LISTEN_ADDRESS=${CORE_API_LISTEN_ADDRESS}
      - POSTGRES_USERNAME=${POSTGRES_USERNAME}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=5432
      - POSTGRES_SSL_MODE=${POSTGRES_SSL_MODE}
      - WINDY_API_TOKEN=${WINDY_API_TOKEN}
      - IP_INFO_API_TOKEN=${IP_INFO_API_TOKEN}
      - TWITCH_API_TOKEN=${TWITCH_API_TOKEN}
    networks:
      - nivek-internal

  nginx:
    container_name: nivek-nginx
    build:
      dockerfile: docker/images/nginx/Dockerfile
    volumes:
      - ./docker/nginx:/etc/nginx/conf.d:ro
      - ./nivek-vue/dist:/usr/share/nginx/html:ro
    networks:
      - nivek-internal
      - gateway
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.nivek.rule=Host(`nivek.life`)
      - traefik.http.routers.nivek.entrypoints=websecure
      - traefik.http.routers.nivek.tls.certresolver=letsencrypt
      - traefik.http.services.nivek.loadbalancer.server.port=80

volumes:
  postgres_data:
    name: postgres_data

networks:
  nivek-internal:
    driver: bridge
  gateway:
    external: true
