services:
  postgres:
    image: postgres:16
    pull_policy: always
    environment:
      - POSTGRES_USER=${POSTGRES_USERNAME}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - nivek-internal

  core-api:
    build:
      dockerfile: docker/images/go/Dockerfile.core-api.prod
      pull: true
    environment:
      - APP_NAME=${APP_NAME}
      - CORE_API_PORT=${CORE_API_PORT}
      - CORE_API_LISTEN_ADDRESS=${CORE_API_LISTEN_ADDRESS}
      - POSTGRES_USERNAME=${POSTGRES_USERNAME}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=5432
      - POSTGRES_SSL_MODE=${POSTGRES_SSL_MODE}
      - WINDY_API_TOKEN=${WINDY_API_TOKEN}
      - IP_INFO_API_TOKEN=${IP_INFO_API_TOKEN}
      - TWITCH_API_TOKEN=${TWITCH_API_TOKEN}
      - DASHBOARD_PUSH_HMAC_KEY=${DASHBOARD_PUSH_HMAC_KEY}
    networks:
      - nivek-internal
    # Lets `docker rollout` wait until a new container is actually serving
    # before removing the old one (zero-downtime deploys). wget ships in the
    # alpine runtime image, so no extra tooling is needed.
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8080/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s

  nginx:
    container_name: nivek-nginx
    build:
      dockerfile: docker/images/nginx/Dockerfile
      pull: true
    volumes:
      - ./docker/nginx:/etc/nginx/conf.d:ro
      # Web root. Defaults to the build output for local dev. In prod, WEB_ROOT
      # points at a STABLE directory (outside the runner workspace) that the
      # deploy rsyncs the build into in place. `npm run build` (vite) wipes and
      # recreates nivek-vue/dist each build, changing its inode; a bind mount
      # pins the old inode, so mounting dist directly leaves nginx serving an
      # empty dir (403) until it's recreated. Mounting a stable, rsync-updated
      # dir keeps the mount valid, so the SPA updates with no nginx recreate.
      - ${WEB_ROOT:-./nivek-vue/dist}:/usr/share/nginx/html:ro
    networks:
      - nivek-internal
      - gateway
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.nivek.rule=Host(`nivek.life`)
      - traefik.http.routers.nivek.entrypoints=websecure
      - traefik.http.routers.nivek.tls.certresolver=letsencrypt
      - traefik.http.services.nivek.loadbalancer.server.port=80

volumes:
  postgres_data:
    name: postgres_data

networks:
  nivek-internal:
    driver: bridge
  gateway:
    external: true
