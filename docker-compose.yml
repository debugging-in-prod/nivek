services:
  postgres:
    image: postgres:16
    pull_policy: always
    environment:
      - POSTGRES_USER=${POSTGRES_USERNAME}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    # No `ports:` mapping: Postgres is reached only over the nivek-internal
    # Docker network by core-api. Publishing 5432 also punches a hole through
    # the host firewall via docker's iptables rules, which exposed the DB to
    # public credential-stuffing scanners. For admin access use
    # `docker compose exec postgres psql`.
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - nivek-internal

  core-api:
    build:
      dockerfile: docker/images/go/Dockerfile.core-api.prod
      pull: true
    environment:
      - APP_NAME=${APP_NAME}
      - CORE_API_PORT=${CORE_API_PORT}
      - CORE_API_LISTEN_ADDRESS=${CORE_API_LISTEN_ADDRESS}
      - POSTGRES_USERNAME=${POSTGRES_USERNAME}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=5432
      - POSTGRES_SSL_MODE=${POSTGRES_SSL_MODE}
      - WINDY_API_TOKEN=${WINDY_API_TOKEN}
      - IP_INFO_API_TOKEN=${IP_INFO_API_TOKEN}
      - TWITCH_API_TOKEN=${TWITCH_API_TOKEN}
      - JWT_SECRET=${JWT_SECRET}
      - TWITCH_CLIENT_ID=${TWITCH_CLIENT_ID}
      - TWITCH_CLIENT_SECRET=${TWITCH_CLIENT_SECRET}
      - TWITCH_REDIRECT_URI=${TWITCH_REDIRECT_URI}
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL}
      - DASHBOARD_PUSH_HMAC_KEY=${DASHBOARD_PUSH_HMAC_KEY}
      - BOT_API_HMAC_KEY=${BOT_API_HMAC_KEY}
    networks:
      - nivek-internal
      - gateway
    restart: unless-stopped
    # Lets `docker rollout` wait until a new container is actually serving
    # before removing the old one (zero-downtime deploys). wget ships in the
    # alpine runtime image, so no extra tooling is needed.
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8080/api/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s
    # Traefik routes nivek.life directly to this container (was nginx). Echo
    # serves the SPA at / and the API under /api, so there's only one backend
    # to talk to — no more nginx for static files or /api proxying.
    labels:
      - traefik.enable=true
      - traefik.http.routers.nivek.rule=Host(`nivek.life`)
      - traefik.http.routers.nivek.entrypoints=websecure
      - traefik.http.routers.nivek.tls.certresolver=letsencrypt
      - traefik.http.services.nivek.loadbalancer.server.port=8080

volumes:
  postgres_data:
    name: postgres_data

networks:
  nivek-internal:
    driver: bridge
  gateway:
    external: true
